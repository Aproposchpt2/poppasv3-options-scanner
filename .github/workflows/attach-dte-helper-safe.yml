name: Attach DTE Helper Safe

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/attach-dte-helper-safe.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Attach helper
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          p = Path('scanner-table-preview.html')
          s = p.read_text(encoding='utf-8')
          tag = base64.b64decode('PHNjcmlwdCBzcmM9Ii9wcmV2aWV3LWR0ZS1sYWJlbC5qcz92PTEiPjwvc2NyaXB0Pg==').decode()
          if tag not in s:
              s = s.replace('</body>', tag + '</body>', 1)
              p.write_text(s, encoding='utf-8')
              print('DTE helper attached')
          else:
              print('DTE helper already attached')
          PY
      - name: Commit
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scanner-table-preview.html
          git commit -m "Attach DTE label helper to preview page"
          git push
