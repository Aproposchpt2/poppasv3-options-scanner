name: Patch Preview Rescan Script Tag

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-preview-rescan-script-tag.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Attach preview rescan timer script
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('scanner-table-preview.html')
          s = p.read_text(encoding='utf-8')
          tag = '<script src="/preview-rescan-timer.js?v=1"></script>'
          if tag in s:
              print('Script tag already present.')
          else:
              s = s.replace('</body>', tag + '</body>', 1)
              p.write_text(s, encoding='utf-8')
              print('Script tag added.')
          PY
      - name: Commit
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scanner-table-preview.html
          git commit -m "Attach timed rescan controller to preview page"
          git push
